services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud
    tmpfs:
      - /var/lib/postgresql/data

  nextcloud:
    image: nextcloud:${NC_VERSION:-33}-fpm
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
    depends_on:
      - db
    volumes:
      - nextcloud:/var/www/html
      - ./zzz-ci-perf.ini:/usr/local/etc/php/conf.d/zzz-ci-perf.ini:ro
      - ./fpm-ci.conf:/usr/local/etc/php-fpm.d/zz-ci.conf:ro

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - nextcloud:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextcloud

  smtp4dev:
    image: rnwood/smtp4dev:latest
    environment:
      ServerOptions__BasePath: /smtp4dev
    ports:
      - "9025:25"
      - "9143:143"
      - "9080:80"

volumes:
  nextcloud:

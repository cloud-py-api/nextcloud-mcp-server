name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-integration:
    name: NC ${{ matrix.nextcloud-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nextcloud-version: ["32", "33"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start containers
        working-directory: .github
        run: |
          NC_VERSION=${{ matrix.nextcloud-version }} docker compose -f docker-compose.ci.yml up -d
          echo "Waiting for Nextcloud FPM to initialize..."
          for i in $(seq 1 90); do
            if docker compose -f docker-compose.ci.yml exec -T nextcloud php occ status 2>/dev/null | grep -q "installed: true"; then
              echo "Nextcloud is ready (attempt $i)"
              break
            fi
            echo "Waiting... ($i)"
            sleep 3
          done

      - name: Configure Nextcloud for testing
        working-directory: .github
        run: |
          OCC="docker compose -f docker-compose.ci.yml exec -T nextcloud php occ"
          $OCC config:system:set ratelimit_protection_enabled --value=false --type=boolean
          $OCC config:system:set auth.bruteforce.protection.enabled --value=false --type=boolean
          $OCC config:system:set loglevel --value=0 --type=integer
          $OCC config:system:set ratelimit_overwrite files_sharing.shareapi.createshare user limit --value=1000 --type=integer
          $OCC config:system:set ratelimit_overwrite files_sharing.shareapi.createshare user period --value=60 --type=integer
          $OCC config:system:set memcache.local '\\OC\\Memcache\\APCu'
          $OCC app:install spreed || echo "spreed already installed"
          $OCC app:install admin_notifications || echo "admin_notifications already installed"
          $OCC app:install announcementcenter || echo "announcementcenter already installed"
          $OCC app:install mail
          SMTP4DEV_IP=$(docker compose -f docker-compose.ci.yml exec -T smtp4dev hostname -i | tr -d '[:space:]')
          echo "smtp4dev IP: $SMTP4DEV_IP"
          $OCC mail:account:create admin 'Test Mail' test@localhost $SMTP4DEV_IP 143 none test test $SMTP4DEV_IP 25 none test test
          $OCC mail:account:sync 1
          $OCC app:list | head -40

      - name: Warm up OPcache
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/status.php > /dev/null
            curl -sf -u admin:admin -H "OCS-APIRequest: true" -H "Accept: application/json" \
              http://localhost:8080/ocs/v2.php/cloud/capabilities > /dev/null
          done

      - name: Verify Nextcloud is accessible
        run: |
          curl -sf http://localhost:8080/status.php | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'NC {d[\"versionstring\"]} installed={d[\"installed\"]}')"

      - name: Run integration tests
        env:
          NEXTCLOUD_URL: http://localhost:8080
          NEXTCLOUD_USER: admin
          NEXTCLOUD_PASSWORD: admin
          SMTP4DEV_HOST: localhost
          SMTP4DEV_HTTP_PORT: "9080"
          SMTP4DEV_SMTP_PORT: "9025"
          MAIL_RECIPIENT: test@localhost
          MAIL_ACCOUNT_ID: "1"
        run: |
          NC_CONTAINER=$(cd .github && docker compose -f docker-compose.ci.yml ps -q nextcloud)
          export NC_CONTAINER
          pytest tests/integration/ -v -m integration --ignore=tests/integration/test_session_cache.py --cov=nc_mcp_server --cov-report=xml:coverage-integration.xml

      - name: Run session cache tests
        if: always()
        env:
          NEXTCLOUD_URL: http://localhost:8080
          NEXTCLOUD_USER: admin
          NEXTCLOUD_PASSWORD: admin
        run: |
          NC_CONTAINER=$(cd .github && docker compose -f docker-compose.ci.yml ps -q nextcloud)
          export NC_CONTAINER
          pytest tests/integration/test_session_cache.py -v -m integration --cov=nc_mcp_server --cov-append --cov-report=xml:coverage-integration.xml

      - name: Upload coverage
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: coverage-integration.xml
          flags: integration,nc${{ matrix.nextcloud-version }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Dump Nextcloud logs on failure
        if: failure()
        working-directory: .github
        run: |
          docker compose -f docker-compose.ci.yml exec -T nextcloud cat /var/www/html/data/nextcloud.log 2>/dev/null | tail -50 || echo "No logs found"
          docker compose -f docker-compose.ci.yml logs --tail=30

      - name: Stop containers
        if: always()
        working-directory: .github
        run: docker compose -f docker-compose.ci.yml down -v
